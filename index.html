<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluerica Chess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111210;
  --surface: #1a1917;
  --surface2: #222120;
  --border: #2e2c28;
  --accent: #c8a45a;
  --accent-dim: rgba(200,164,90,0.12);
  --light-sq: #f0d9b5;
  --dark-sq: #b58863;
  --text: #e8e2d6;
  --muted: #7a7060;
  --green: #5ea87a;
  --red: #c95f5f;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--accent); letter-spacing: 0.02em; }
.logo em { font-style: italic; color: var(--muted); font-size: 0.85em; margin-left: 6px; }
.status-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
  color: var(--muted); letter-spacing: 0.08em; transition: all 0.3s;
}
.status-badge.your-turn { border-color: var(--green); color: var(--green); }
.status-badge.thinking  { border-color: var(--accent); color: var(--accent); }
.status-badge.check     { border-color: var(--red); color: var(--red); }

/* LAYOUT */
main {
  display: flex; align-items: flex-start; justify-content: center;
  gap: 24px; padding: 24px 20px; flex-wrap: wrap; min-height: calc(100vh - 53px);
}

/* BOARD AREA */
.board-area { display: flex; flex-direction: column; align-items: center; gap: 6px; }

.player-row {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 6px 2px;
}
.player-name {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.player-name.active { color: var(--text); }
.turn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: none; }
.player-name.active .turn-dot { display: block; }
.captured { font-size: 0.75rem; color: var(--muted); min-height: 16px; }

/* BOARD */
#board-wrap { position: relative; }
#board {
  display: grid; grid-template-columns: repeat(8, 92px); grid-template-rows: repeat(8, 92px);
  border: 2px solid #3a3530;
  box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(200,164,90,0.08);
}

.sq {
  width: 92px; height: 92px; position: relative;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.sq.light { background: var(--light-sq); }
.sq.dark  { background: var(--dark-sq); }
.sq.selected { outline: 3px solid rgba(200,164,90,0.8); outline-offset: -3px; background: rgba(200,164,90,0.4) !important; }
.sq.last-from { background: rgba(200,164,90,0.22) !important; }
.sq.last-to   { background: rgba(200,164,90,0.38) !important; }
.sq.in-check  { background: rgba(200, 60, 60, 0.55) !important; }

/* Move hints */
.hint {
  position: absolute; pointer-events: none; border-radius: 50%;
  width: 36px; height: 36px;
  background: rgba(0,0,0,0.18);
  display: none;
}
.sq.can-move .hint { display: block; }
.sq.can-capture .hint {
  width: 100%; height: 100%; border-radius: 0;
  background: transparent;
  border: 5px solid rgba(0,0,0,0.16);
  border-radius: 50%;
}

/* Coord labels */
.coord-r {
  position: absolute; top: 2px; left: 3px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
  font-weight: 500; pointer-events: none;
}
.coord-f {
  position: absolute; bottom: 2px; right: 3px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
  font-weight: 500; pointer-events: none;
}
.sq.light .coord-r, .sq.light .coord-f { color: var(--dark-sq); }
.sq.dark  .coord-r, .sq.dark  .coord-f { color: var(--light-sq); }

/* SVG pieces */
.piece-svg { width: 78px; height: 78px; position: relative; z-index: 1; pointer-events: none; transition: transform 0.1s; }
.sq:hover .piece-svg { transform: scale(1.06); }

/* SIDEBAR */
.sidebar { width: 250px; display: flex; flex-direction: column; gap: 14px; padding-top: 4px; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.panel-head {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
}
.panel-body { padding: 14px; }

/* Cat mascot */
.cat-panel { border-color: var(--border); overflow: hidden; }
.cat-img-wrap { position: relative; }
.cat-img-wrap img { width: 100%; display: block; filter: saturate(0.9); }


/* Eval */
.eval-row { display: flex; align-items: center; gap: 10px; }
.eval-bar { flex: 1; height: 5px; background: #1a1a18; border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
.eval-fill { height: 100%; background: var(--light-sq); border-radius: 3px; transition: width 0.6s ease; width: 50%; }
.eval-num { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); min-width: 36px; text-align: right; }

/* Difficulty */
.diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.diff-btn {
  padding: 7px 4px; border: 1px solid var(--border); background: transparent;
  color: var(--muted); border-radius: 4px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s; text-align: center;
}
.diff-btn:hover { border-color: var(--accent); color: var(--text); }
.diff-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.diff-sub { display: block; font-size: 0.54rem; margin-top: 2px; opacity: 0.55; font-family: 'Inter', sans-serif; }

/* Color pick */
.color-row { display: flex; gap: 8px; }
.color-btn {
  flex: 1; padding: 9px 6px; border: 1px solid var(--border); background: transparent;
  border-radius: 4px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; letter-spacing: 0.04em; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.color-btn.w-btn { color: #d4c9a8; }
.color-btn.b-btn { color: var(--muted); }
.color-btn.w-btn.active { border-color: #d4c9a8; background: rgba(212,201,168,0.08); color: #e8dfc8; }
.color-btn.b-btn.active { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.04); }
.color-btn:hover { opacity: 0.85; }

/* New game */
.new-btn {
  width: 100%; padding: 11px; background: var(--accent); color: #111210;
  border: none; border-radius: 4px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; transition: background 0.15s; font-weight: 500;
}
.new-btn:hover { background: #d4b06a; }

/* Move list */
.move-list { max-height: 160px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; }
.move-list::-webkit-scrollbar { width: 3px; }
.move-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.move-row { display: grid; grid-template-columns: 24px 1fr 1fr; gap: 4px; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.mn { color: var(--border); }
.mw { color: var(--text); }
.mb { color: var(--muted); }
.move-row.latest .mw, .move-row.latest .mb { color: var(--accent); }
.empty-moves { color: var(--border); font-size: 0.6rem; padding: 6px 0; }

/* Engine indicator */
.eng-row { display: flex; align-items: center; gap: 7px; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--muted); }
.eng-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
.eng-dot.ready { background: var(--green); }
.eng-dot.busy  { background: var(--accent); animation: blink 0.7s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* OVERLAY */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.82); align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
.overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 36px 44px; text-align: center; max-width: 300px;
}
.modal-glyph { font-size: 2.6rem; margin-bottom: 12px; }
.modal h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--accent); margin-bottom: 8px; }
.modal p { color: var(--muted); font-size: 0.82rem; line-height: 1.6; margin-bottom: 22px; }

/* PROMO */
.promo-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
}
.promo-overlay.show { display: flex; }
.promo-box {
  background: var(--surface); border: 1px solid var(--accent);
  border-radius: 8px; padding: 20px 24px; text-align: center;
}
.promo-box h3 { font-family: 'Playfair Display', serif; color: var(--accent); margin-bottom: 14px; }
.promo-row { display: flex; gap: 8px; }
.promo-sq {
  width: 64px; height: 64px; border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; background: var(--surface2); display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.promo-sq:hover { border-color: var(--accent); background: var(--accent-dim); }


/* Drag & drop */
.piece-svg { cursor: grab; }
.piece-svg.dragging { opacity: 0; }
.drag-ghost {
  position: fixed; pointer-events: none; z-index: 1000;
  width: 96px; height: 96px; transform: translate(-50%, -50%);
}
.sq.drag-over { outline: 3px solid rgba(200,164,90,0.9); outline-offset: -3px; }



.action-row { display: flex; gap: 8px; }
.action-btn {
  flex: 1; padding: 9px 6px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.action-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.action-btn:disabled { opacity: 0.28; cursor: not-allowed; }
.hint-btn:hover:not(:disabled) { border-color: #7ec8a0; color: #7ec8a0; }
.resign-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
.hint-highlight { outline: 3px solid #7ec8a0 !important; outline-offset: -3px; animation: hint-pulse 0.6s ease 3; }
@keyframes hint-pulse { 0%,100%{outline-color:#7ec8a0} 50%{outline-color:transparent} }



/* Premove */
.sq.premove-from { background: rgba(100, 180, 255, 0.45) !important; }
.sq.premove-to   { background: rgba(100, 180, 255, 0.35) !important; }

/* Right-click highlights */
.sq.rc-highlight { background: rgba(220, 60, 60, 0.55) !important; }

/* Arrow SVG overlay */
#arrow-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

/* Premove indicator in status */
.premove-badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: #64b4ff;
  border: 1px solid #64b4ff;
  border-radius: 20px;
  padding: 2px 8px;
  margin-left: 8px;
  letter-spacing: 0.06em;
}

@media (max-width: 900px) {
  main { flex-direction: column; align-items: center; padding: 12px; }
  #board { grid-template-columns: repeat(8, 48px); grid-template-rows: repeat(8, 48px); }
  .sq { width: 48px; height: 48px; }
  .piece-svg { width: 42px; height: 42px; }
  .hint { width: 20px; height: 20px; }
  .sidebar { width: 100%; max-width: 360px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">BLUERICA <em>chess</em></div>
  <div class="status-badge" id="status-badge">loading…</div>
</header>

<main>
  <div class="board-area">
    <div class="player-row" id="top-row">
      <span class="player-name" id="top-name"><span class="turn-dot"></span>BLUERICA</span>
      <span class="captured" id="top-cap"></span>
    </div>
    <div id="board-wrap"><div id="board"></div><svg id="arrow-layer" viewBox="0 0 736 736" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr-head" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto"><path d="M0,0 L0,4 L4,2 z" fill="rgba(220,60,60,0.85)"/></marker><marker id="arr-head-green" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto"><path d="M0,0 L0,4 L4,2 z" fill="rgba(100,200,100,0.9)"/></marker></defs></svg></div>
    <div class="player-row" id="bot-row">
      <span class="player-name active" id="bot-name"><span class="turn-dot"></span>You</span>
      <span class="captured" id="bot-cap"></span>
    </div>
  </div>

  <div class="sidebar">

    <!-- Engine status -->
    <div class="eng-row">
      <div class="eng-dot" id="eng-dot"></div>
      <span id="eng-label">Loading BLUERICA…</span>
    </div>

    <!-- Cat mascot -->
    <div class="panel cat-panel">
      <div class="cat-img-wrap">
        <img src="cat.jpg" alt="Chess cat" />
        
      </div>
    </div>

    <!-- Eval -->
    <div class="panel">
      <div class="panel-head">Position</div>
      <div class="panel-body" style="padding:10px 14px;">
        <div class="eval-row">
          <div class="eval-bar"><div class="eval-fill" id="eval-fill"></div></div>
          <div class="eval-num" id="eval-num">0.0</div>
        </div>
      </div>
    </div>

    <!-- Difficulty -->
    <div class="panel">
      <div class="panel-head">Difficulty</div>
      <div class="panel-body">
        <div class="diff-grid">
          <button class="diff-btn active" data-skill="0"  data-depth="1" data-delay="1200">1<span class="diff-sub">Newbie</span></button>
          <button class="diff-btn" data-skill="1"  data-depth="1" data-delay="1000">2<span class="diff-sub">Beginner</span></button>
          <button class="diff-btn" data-skill="3"  data-depth="2" data-delay="900">3<span class="diff-sub">Easy</span></button>
          <button class="diff-btn" data-skill="5"  data-depth="3" data-delay="700">4<span class="diff-sub">Casual</span></button>
          <button class="diff-btn" data-skill="8"  data-depth="5" data-delay="600">5<span class="diff-sub">Medium</span></button>
          <button class="diff-btn" data-skill="11" data-depth="7" data-delay="500">6<span class="diff-sub">Club</span></button>
          <button class="diff-btn" data-skill="14" data-depth="10" data-delay="400">7<span class="diff-sub">Hard</span></button>
          <button class="diff-btn" data-skill="17" data-depth="13" data-delay="350">8<span class="diff-sub">Expert</span></button>
          <button class="diff-btn" data-skill="20" data-depth="18" data-delay="300">∞<span class="diff-sub">Max</span></button>
        </div>
      </div>
    </div>

    <!-- Play as -->
    <div class="panel">
      <div class="panel-head">Play as</div>
      <div class="panel-body">
        <div class="color-row">
          <button class="color-btn w-btn active" id="btn-w">⬜ White</button>
          <button class="color-btn b-btn" id="btn-b">⬛ Black</button>
        </div>
      </div>
    </div>

    <button class="new-btn" id="new-btn">New Game</button>
    <div class="action-row">
      <button class="action-btn" id="back-btn" title="Go back one move">◀ Back</button>
      <button class="action-btn" id="fwd-btn" title="Go forward one move">Forward ▶</button>
    </div>
    <div class="action-row">
      <button class="action-btn hint-btn" id="hint-btn" title="Show best move">💡 Hint</button>
      <button class="action-btn resign-btn" id="resign-btn" title="Resign game">🏳 Resign</button>
    </div>

    <!-- Moves -->
    <div class="panel">
      <div class="panel-head">Move history</div>
      <div class="panel-body" style="padding:8px 14px;">
        <div class="move-list" id="move-list">
          <div class="empty-moves">— no moves yet —</div>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- Game over -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-glyph" id="modal-glyph">♟</div>
    <h2 id="modal-title">Game Over</h2>
    <p id="modal-msg"></p>
    <button class="new-btn" id="modal-new-btn" style="max-width:180px;margin:0 auto;">Play Again</button>
  </div>
</div>

<!-- Promotion -->
<div class="promo-overlay" id="promo-overlay">
  <div class="promo-box">
    <h3>Promote pawn</h3>
    <div class="promo-row" id="promo-row"></div>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────────────────────
let chess        = new Chess();
let playerColor  = 'w';
let selectedSq   = null;
let legalMoves   = [];
let lastFrom     = null;
let lastTo       = null;
let engineReady  = false;
let engineBusy   = false;
let pendingPromo = null;
let skillLevel   = 0;
let searchDepth  = 1;
let stockfish    = null;
let resolveMove  = null;

const $ = id => document.getElementById(id);


// ── Sound (Lichess) ───────────────────────────────────────────────────────────
const sounds = {};
const soundFiles = { move: 'Move', capture: 'Capture', select: 'Select', notify: 'GenericNotify' };

function loadSounds() {
  Object.entries(soundFiles).forEach(([key, file]) => {
    const audio = new Audio(`sounds/${file}.mp3`);
    audio.preload = 'auto';
    sounds[key] = audio;
  });
}

function playSound(key) {
  const s = sounds[key];
  if (!s) return;
  const clone = s.cloneNode();
  clone.volume = 0.7;
  clone.play().catch(() => {});
}

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playCheck() {
  ensureAudio();
  const t = audioCtx.currentTime;
  [0, 0.12, 0.24].forEach((offset, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880 - i * 60, t + offset);
    gain.gain.setValueAtTime(0.15, t + offset);
    gain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.1);
    osc.start(t + offset); osc.stop(t + offset + 0.1);
  });
}

function playGameOver(won) {
  playSound('notify');
}

function playSoundForMove(move) {
  if (!move) return;
  if (move.flags && (move.flags.includes('c') || move.flags.includes('e'))) {
    playSound('capture'); return;
  }
  playSound('move');
}

// ── Stockfish ─────────────────────────────────────────────────────────────────
function initEngine() {
  try {
    // Use blob worker to avoid CORS issues
    const workerCode = `importScripts('https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js');`;
    const blob = new Blob([workerCode], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    stockfish = new Worker(url);
    stockfish.onmessage = e => {
      const msg = e.data;
      if (msg === 'uciok') { stockfish.postMessage('isready'); return; }
      if (msg === 'readyok') {
        engineReady = true;
        $('eng-dot').className = 'eng-dot ready';
        $('eng-label').textContent = 'BLUERICA ready';
        $('status-badge').textContent = 'your move';
        $('status-badge').className = 'status-badge your-turn';
        return;
      }
      if (msg && msg.startsWith('bestmove') && resolveMove) {
        const mv = msg.split(' ')[1];
        const cb = resolveMove; resolveMove = null;
        cb(mv === '(none)' ? null : mv);
        return;
      }
      if (msg && msg.includes('score cp')) {
        const m = msg.match(/score cp (-?\d+)/);
        if (m) updateEval(parseInt(m[1]) / 100);
      }
      if (msg && msg.includes('score mate')) {
        const m = msg.match(/score mate (-?\d+)/);
        if (m) updateEval(parseInt(m[1]) > 0 ? 99 : -99);
      }
    };
    stockfish.onerror = () => {
      $('eng-label').textContent = 'Engine failed — check connection';
    };
    stockfish.postMessage('uci');
  } catch(e) {
    $('eng-label').textContent = 'Engine unavailable';
  }
}

function updateEval(cp) {
  // Positive = white advantage
  const pct = Math.min(Math.max(50 + cp * 3.5, 4), 96);
  $('eval-fill').style.width = pct + '%';
  $('eval-num').textContent = cp >= 99 ? '+M' : cp <= -99 ? '-M' : (cp >= 0 ? '+' : '') + cp.toFixed(1);
}

async function getBestMove(fen) {
  return new Promise(resolve => {
    resolveMove = resolve;
    stockfish.postMessage(`setoption name Skill Level value ${skillLevel}`);
    stockfish.postMessage(`position fen ${fen}`);
    stockfish.postMessage(`go depth ${searchDepth}`);
  });
}

// ── Board rendering ───────────────────────────────────────────────────────────
function renderBoard() {
  const el = $('board');
  el.innerHTML = '';
  const flip = playerColor === 'b';

  for (let ri = 0; ri < 8; ri++) {
    for (let ci = 0; ci < 8; ci++) {
      const row = flip ? ri : 7 - ri;
      const col = flip ? 7 - ci : ci;
      const sqName = 'abcdefgh'[col] + (row + 1);
      const isLight = (row + col) % 2 === 1;

      const sq = document.createElement('div');
      sq.className = 'sq ' + (isLight ? 'light' : 'dark');
      sq.dataset.sq = sqName;
      if (rcHighlights.has(sqName)) sq.classList.add('rc-highlight');
      if (premoveFrom === sqName) sq.classList.add('premove-from');
      if (premoveTo   === sqName) sq.classList.add('premove-to');

      // Highlights
      if (selectedSq === sqName) sq.classList.add('selected');
      if (lastFrom === sqName)   sq.classList.add('last-from');
      if (lastTo   === sqName)   sq.classList.add('last-to');

      // Check highlight
      if (chess.in_check()) {
        const turn = chess.turn();
        const board = chess.board();
        for (let r = 0; r < 8; r++) {
          for (let c = 0; c < 8; c++) {
            const p = board[r][c];
            if (p && p.type === 'k' && p.color === turn) {
              const ksq = 'abcdefgh'[c] + (8 - r);
              if (ksq === sqName) sq.classList.add('in-check');
            }
          }
        }
      }

      // Move hints
      const hint = document.createElement('div');
      hint.className = 'hint';
      sq.appendChild(hint);

      const isTarget = legalMoves.find(m => m.to === sqName);
      if (isTarget) {
        const piece = chess.get(sqName);
        sq.classList.add(piece ? 'can-capture' : 'can-move');
      }

      // Coord labels
      if (ci === 0) {
        const rl = document.createElement('span');
        rl.className = 'coord-r';
        rl.textContent = row + 1;
        sq.appendChild(rl);
      }
      if (ri === 7) {
        const fl = document.createElement('span');
        fl.className = 'coord-f';
        fl.textContent = 'abcdefgh'[col];
        sq.appendChild(fl);
      }

      // Piece
      const piece = chess.get(sqName);
      if (piece) {
        const key = piece.color + piece.type.toUpperCase();
        const div = document.createElement('div');
        div.className = 'piece-svg';
        div.innerHTML = SVG[key] || '';
        sq.appendChild(div);
      }

      sq.addEventListener('click', () => onSquareClick(sqName));
      el.appendChild(sq);
      if (chess.get(sqName)) setupDrag(sq, sqName);
    }
  }

  updatePlayerBars();
  updateMoveList();
}

function onSquareClick(sqName) {
  // Clear arrows/highlights on any left click
  if (rcHighlights.size > 0 || arrows.length > 0) {
    rcHighlights.clear();
    arrows = [];
    renderArrows();
    renderBoard();
  }

  if (chess.game_over()) return;

  // PREMOVE: if engine is thinking, allow setting premove
  if (engineBusy || chess.turn() !== playerColor) {
    if (selectedSq) {
      const piece = chess.get(selectedSq);
      if (piece && piece.color === playerColor) {
        // Set premove
        setPremove(selectedSq, sqName);
        selectedSq = null; legalMoves = [];
        return;
      }
    }
    // Select piece for premove
    const p = chess.get(sqName);
    if (p && p.color === playerColor) {
      selectedSq = sqName;
      legalMoves = chess.moves({ square: sqName, verbose: true });
      renderBoard();
    }
    return;
  }

  if (selectedSq) {
    const target = legalMoves.find(m => m.to === sqName);
    if (target) {
      // Promotion?
      const piece = chess.get(selectedSq);
      const toRank = sqName[1];
      if (piece && piece.type === 'p' && (toRank === '8' || toRank === '1')) {
        pendingPromo = { from: selectedSq, to: sqName };
        showPromoDialog();
        return;
      }
      doMove(selectedSq, sqName);
      return;
    }

    const p = chess.get(sqName);
    if (p && p.color === playerColor) {
      selectSquare(sqName); return;
    }

    selectedSq = null; legalMoves = [];
    renderBoard(); return;
  }

  const p = chess.get(sqName);
  if (p && p.color === playerColor) {
    selectSquare(sqName);
  }
}

function selectSquare(sqName) {
  selectedSq = sqName;
  legalMoves = chess.moves({ square: sqName, verbose: true });
  renderBoard();
}

function doMove(from, to, promo) {
  const move = chess.move({ from, to, promotion: promo || 'q' });
  if (!move) return;
  lastFrom = from; lastTo = to;
  selectedSq = null; legalMoves = [];
  renderBoard();
  updateStatus();
  playSoundForMove(move);
  if (chess.in_check()) playCheck();
  if (chess.game_over()) { playGameOver(); setTimeout(showGameOver, 600); return; }
  // Execute premove if player had one queued
  setTimeout(executePremoveIfSet, 50);
  if (chess.turn() !== playerColor) engineTurn();
}

async function engineTurn() {
  if (!engineReady) return;
  engineBusy = true;
  $('status-badge').textContent = 'thinking…';
  $('status-badge').className = 'status-badge thinking';
  $('eng-dot').className = 'eng-dot busy';

  const best = await getBestMove(chess.fen());

  // Delay so it feels natural
  await new Promise(r => setTimeout(r, engineDelay + Math.random() * 300));

  engineBusy = false;
  $('eng-dot').className = 'eng-dot ready';

  if (!best) return;
  const from = best.slice(0, 2);
  const to   = best.slice(2, 4);
  const promo = best[4] ? best[4] : undefined;

  const engineMove = chess.move({ from, to, promotion: promo });
  lastFrom = from; lastTo = to;
  selectedSq = null; legalMoves = [];
  renderBoard();
  updateStatus();
  playSoundForMove(engineMove);
  if (chess.in_check()) playCheck();
  if (chess.game_over()) { playGameOver(); setTimeout(showGameOver, 600); return; }
}

function updateStatus() {
  if (chess.game_over()) return;
  if (chess.in_check()) {
    $('status-badge').textContent = 'check!';
    $('status-badge').className = 'status-badge check';
  } else if (chess.turn() === playerColor) {
    $('status-badge').textContent = 'your move';
    $('status-badge').className = 'status-badge your-turn';
  }
}

function updatePlayerBars() {
  const turn = chess.turn();
  const topIsEngine = playerColor === 'w';

  const topEl = $('top-name');
  const botEl = $('bot-name');

  if (topIsEngine) {
    topEl.className = 'player-name' + (turn === 'b' ? ' active' : '');
    botEl.className = 'player-name' + (turn === 'w' ? ' active' : '');
    $('top-name').childNodes[1] && ($('top-name').childNodes[0].textContent = '');
    topEl.innerHTML = `<span class="turn-dot"></span>BLUERICA`;
    botEl.innerHTML = `<span class="turn-dot"></span>You`;
  } else {
    topEl.className = 'player-name' + (turn === 'w' ? ' active' : '');
    botEl.className = 'player-name' + (turn === 'b' ? ' active' : '');
    topEl.innerHTML = `<span class="turn-dot"></span>You`;
    botEl.innerHTML = `<span class="turn-dot"></span>BLUERICA`;
  }
}

function updateMoveList() {
  const history = chess.history();
  if (!history.length) {
    $('move-list').innerHTML = '<div class="empty-moves">— no moves yet —</div>';
    return;
  }
  let html = '';
  for (let i = 0; i < history.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    const w = history[i] || '';
    const b = history[i + 1] || '';
    const isLatest = i >= history.length - 2;
    html += `<div class="move-row${isLatest ? ' latest' : ''}">
      <span class="mn">${num}.</span>
      <span class="mw">${w}</span>
      <span class="mb">${b}</span>
    </div>`;
  }
  const ml = $('move-list');
  ml.innerHTML = html;
  ml.scrollTop = ml.scrollHeight;
}

function showPromoDialog() {
  const color = playerColor;
  const types = ['q','r','b','n'];
  const labels = { q:'Queen', r:'Rook', b:'Bishop', n:'Knight' };
  const row = $('promo-row');
  row.innerHTML = '';
  types.forEach(t => {
    const key = color + t.toUpperCase();
    const sq = document.createElement('div');
    sq.className = 'promo-sq';
    sq.innerHTML = SVG[key] || '';
    sq.title = labels[t];
    sq.addEventListener('click', () => {
      $('promo-overlay').classList.remove('show');
      const { from, to } = pendingPromo;
      pendingPromo = null;
      doMove(from, to, t);
    });
    row.appendChild(sq);
  });
  $('promo-overlay').classList.add('show');
}

function showGameOver() {
  let icon, title, msg;
  const won = chess.in_checkmate() && chess.turn() !== playerColor;
  const lost = chess.in_checkmate() && chess.turn() === playerColor;

  if (chess.in_checkmate()) {
    icon = won ? '🏆' : '😿';
    title = won ? 'You win!' : 'Checkmate';
    msg = won ? 'You checkmated BLUERICA. Impressive! 😺' : 'BLUERICA wins this round. Try again? 😼';
  } else if (chess.in_stalemate()) {
    icon = '🤝'; title = 'Stalemate'; msg = 'No legal moves available. The game is drawn.';
  } else if (chess.in_draw()) {
    icon = '½'; title = 'Draw'; msg = 'The game ended in a draw.';
  } else {
    icon = '♟'; title = 'Game Over'; msg = '';
  }

  $('modal-glyph').textContent = icon;
  $('modal-title').textContent = title;
  $('modal-msg').textContent = msg;
  $('overlay').classList.add('show');
  $('status-badge').textContent = title.toLowerCase();
  $('status-badge').className = 'status-badge';
}

function newGame() {
  chess = new Chess();
  historyStack = []; viewIndex = -1;
  selectedSq = null; legalMoves = [];
  lastFrom = null; lastTo = null;
  engineBusy = false; pendingPromo = null;
  $('overlay').classList.remove('show');
  updateEval(0);
  clearArrows();
  rcHighlights.clear();
  renderBoard();
  updateStatus();
  if (playerColor === 'b') engineTurn();
}


// ── Drag & Drop ───────────────────────────────────────────────────────────────
let dragFrom = null;
let dragGhost = null;

function setupDrag(sqEl, sqName) {
  const pieceEl = sqEl.querySelector('.piece-svg');
  if (!pieceEl) return;

  pieceEl.addEventListener('mousedown', e => {
    if (chess.game_over()) return;
    const piece = chess.get(sqName);
    if (!piece || piece.color !== playerColor) return;
    if (chess.turn() !== playerColor) return;
    if (engineBusy) return;

    e.preventDefault();
    dragFrom = sqName;

    // Highlight legal moves
    selectedSq = sqName;
    legalMoves = chess.moves({ square: sqName, verbose: true });
    renderBoard();

    // Create ghost
    dragGhost = document.createElement('div');
    dragGhost.className = 'drag-ghost';
    dragGhost.innerHTML = pieceEl.innerHTML;
    dragGhost.style.left = e.clientX + 'px';
    dragGhost.style.top  = e.clientY + 'px';
    document.body.appendChild(dragGhost);

    // Hide original
    const orig = document.querySelector(`[data-sq="${sqName}"] .piece-svg`);
    if (orig) orig.classList.add('dragging');

    const onMove = ev => {
      dragGhost.style.left = ev.clientX + 'px';
      dragGhost.style.top  = ev.clientY + 'px';

      // Highlight square under cursor
      document.querySelectorAll('.sq.drag-over').forEach(s => s.classList.remove('drag-over'));
      const els = document.elementsFromPoint(ev.clientX, ev.clientY);
      const sqUnder = els.find(el => el.classList && el.classList.contains('sq'));
      if (sqUnder) sqUnder.classList.add('drag-over');
    };

    const onUp = ev => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.querySelectorAll('.sq.drag-over').forEach(s => s.classList.remove('drag-over'));

      if (dragGhost) { dragGhost.remove(); dragGhost = null; }

      const orig2 = document.querySelector(`[data-sq="${dragFrom}"] .piece-svg`);
      if (orig2) orig2.classList.remove('dragging');

      // Find drop target
      const els2 = document.elementsFromPoint(ev.clientX, ev.clientY);
      const sqUnder = els2.find(el => el.classList && el.classList.contains('sq'));
      if (sqUnder && sqUnder.dataset.sq && sqUnder.dataset.sq !== dragFrom) {
        onSquareClick(sqUnder.dataset.sq);
      } else {
        // Dropped on same square or outside — deselect
        selectedSq = null; legalMoves = [];
        renderBoard();
      }
      dragFrom = null;
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── Controls ──────────────────────────────────────────────────────────────────
let engineDelay = 1200;

// Restore saved difficulty
(function restoreDifficulty() {
  const saved = localStorage.getItem('bluerica-level');
  if (saved) {
    const btn = document.querySelector(`.diff-btn[data-skill="${saved}"]`);
    if (btn) {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      skillLevel  = parseInt(btn.dataset.skill);
      searchDepth = parseInt(btn.dataset.depth);
      engineDelay = parseInt(btn.dataset.delay) || 300;
    }
  }
})();

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    skillLevel   = parseInt(btn.dataset.skill);
    searchDepth  = parseInt(btn.dataset.depth);
    engineDelay  = parseInt(btn.dataset.delay) || 300;
    localStorage.setItem('bluerica-level', btn.dataset.skill);
  });
});

$('btn-w').addEventListener('click', () => {
  $('btn-w').classList.add('active'); $('btn-b').classList.remove('active');
  playerColor = 'w'; newGame();
});
$('btn-b').addEventListener('click', () => {
  $('btn-b').classList.add('active'); $('btn-w').classList.remove('active');
  playerColor = 'b'; newGame();
});

$('new-btn').addEventListener('click', newGame);
$('back-btn').addEventListener('click', backMove);
$('fwd-btn').addEventListener('click', forwardMove);
$('hint-btn').addEventListener('click', showHint);
$('resign-btn').addEventListener('click', resign);
$('modal-new-btn').addEventListener('click', newGame);



// ── Premove ───────────────────────────────────────────────────────────────────
let premoveFrom = null;
let premoveTo   = null;
let premovePromo = null;

function setPremove(from, to) {
  premoveFrom = from;
  premoveTo   = to;
  premovePromo = null;
  renderBoard();
  // Show premove badge in status
  const badge = $('status-badge');
  badge.innerHTML = 'thinking… <span class="premove-badge">premove set</span>';
}

function clearPremove() {
  premoveFrom = null;
  premoveTo   = null;
  premovePromo = null;
}

function executePremoveIfSet() {
  if (!premoveFrom || !premoveTo) return;
  const from = premoveFrom;
  const to   = premoveTo;
  const promo = premovePromo;
  clearPremove();
  // Check if premove is still legal
  const moves = chess.moves({ square: from, verbose: true });
  const valid = moves.find(m => m.to === to);
  if (!valid) { renderBoard(); updateStatus(); return; }
  // Execute it
  const piece = chess.get(from);
  const toRank = to[1];
  if (piece && piece.type === 'p' && (toRank === '8' || toRank === '1')) {
    pendingPromo = { from, to };
    showPromoDialog();
    return;
  }
  doMove(from, to, promo);
}

// ── Right-click Arrows & Highlights ──────────────────────────────────────────
let rcHighlights = new Set();   // highlighted squares
let arrows       = [];          // [{from, to, color}]
let rcDragFrom   = null;
let rcDragStarted = false;

function sqCenter(sqName, sqSize) {
  const flip = playerColor === 'b';
  const col = 'abcdefgh'.indexOf(sqName[0]);
  const row = parseInt(sqName[1]) - 1;
  const c = flip ? 7 - col : col;
  const r = flip ? row : 7 - row;
  return {
    x: c * sqSize + sqSize / 2,
    y: r * sqSize + sqSize / 2
  };
}

function renderArrows() {
  const layer = $('arrow-layer');
  // Remove old arrows (keep defs)
  const toRemove = [...layer.querySelectorAll('line, path, circle, polygon')];
  toRemove.forEach(el => el.remove());

  // Get actual square size from DOM
  const firstSq = document.querySelector('.sq');
  const sqSize = firstSq ? firstSq.offsetWidth : 92;
  const boardSize = sqSize * 8;

  // Update viewBox to match actual board size
  layer.setAttribute('viewBox', `0 0 ${boardSize} ${boardSize}`);

  arrows.forEach(({ from, to, color }) => {
    const fc = sqCenter(from, sqSize);
    const tc = sqCenter(to, sqSize);

    const markerId = color === 'green' ? 'arr-head-green' : 'arr-head';
    const strokeColor = color === 'green' ? 'rgba(100,200,100,0.88)' : 'rgba(220,60,60,0.85)';

    // Shorten line so arrow head is visible
    const dx = tc.x - fc.x;
    const dy = tc.y - fc.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const shorten = sqSize * 0.38;
    const ex = tc.x - (dx / len) * shorten;
    const ey = tc.y - (dy / len) * shorten;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', fc.x);
    line.setAttribute('y1', fc.y);
    line.setAttribute('x2', ex);
    line.setAttribute('y2', ey);
    line.setAttribute('stroke', strokeColor);
    line.setAttribute('stroke-width', sqSize * 0.16);
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('marker-end', `url(#${markerId})`);
    layer.appendChild(line);
  });
}

function clearArrows() {
  arrows = [];
  renderArrows();
}

function toggleHighlight(sqName) {
  if (rcHighlights.has(sqName)) {
    rcHighlights.delete(sqName);
  } else {
    rcHighlights.add(sqName);
  }
  renderBoard();
}

function addArrow(from, to) {
  // Toggle: if same arrow exists, remove it
  const idx = arrows.findIndex(a => a.from === from && a.to === to);
  if (idx !== -1) {
    arrows.splice(idx, 1);
  } else {
    arrows.push({ from, to, color: 'red' });
  }
  renderArrows();
}

function setupRightClickOnBoard() {
  const boardWrap = $('board-wrap');

  // Prevent context menu on entire board area
  boardWrap.addEventListener('contextmenu', e => e.preventDefault());

  boardWrap.addEventListener('mousedown', e => {
    if (e.button !== 2) return;
    e.preventDefault();
    e.stopPropagation();
    const sqEl = e.target.closest('.sq');
    if (!sqEl) return;
    rcDragFrom = sqEl.dataset.sq;
    rcDragStarted = false;
  });

  // Track mouse move over entire document while dragging
  document.addEventListener('mousemove', e => {
    if (!(e.buttons & 2)) return;
    if (!rcDragFrom) return;
    const sqEl = e.target.closest ? e.target.closest('.sq') : null;
    if (sqEl && sqEl.dataset.sq && sqEl.dataset.sq !== rcDragFrom) {
      rcDragStarted = true;
    }
  });

  document.addEventListener('mouseup', e => {
    if (e.button !== 2) return;
    if (!rcDragFrom) return;
    e.preventDefault();

    const sqEl = e.target.closest ? e.target.closest('.sq') : null;
    const toSq = sqEl ? sqEl.dataset.sq : null;

    if (rcDragStarted && toSq && toSq !== rcDragFrom) {
      addArrow(rcDragFrom, toSq);
    } else {
      toggleHighlight(rcDragFrom);
    }
    rcDragFrom = null;
    rcDragStarted = false;
  });
}

// ── Navigation (Back / Forward / Hint / Resign) ───────────────────────────────
let historyStack = [];   // full move history for forward navigation
let viewIndex    = -1;   // -1 = live position
let hintTimeout  = null;

function backMove() {
  // Save live game if just entering review mode
  if (viewIndex === -1) {
    historyStack = chess.history({ verbose: true });
  }
  if (viewIndex === -1) viewIndex = historyStack.length;
  if (viewIndex <= 0) return;
  viewIndex--;
  // Rebuild board up to viewIndex
  rebuildToIndex(viewIndex);
  playSound('select');
}

function forwardMove() {
  if (viewIndex === -1 || viewIndex >= historyStack.length) return;
  viewIndex++;
  rebuildToIndex(viewIndex);
  playSound('select');
  if (viewIndex === historyStack.length) viewIndex = -1; // back to live
}

function rebuildToIndex(idx) {
  // Replay game from start up to idx moves
  const tempChess = new Chess();
  for (let i = 0; i < idx; i++) {
    const m = historyStack[i];
    tempChess.move({ from: m.from, to: m.to, promotion: m.promotion });
  }
  // Render this position (read-only view)
  const savedChess = chess;
  chess = tempChess;
  lastFrom = idx > 0 ? historyStack[idx-1].from : null;
  lastTo   = idx > 0 ? historyStack[idx-1].to   : null;
  selectedSq = null; legalMoves = [];
  renderBoard();
  chess = savedChess;
  // Show review indicator
  const pill = $('status-badge');
  if (viewIndex !== -1) {
    pill.textContent = `move ${idx} / ${historyStack.length}`;
    pill.className = 'status-badge thinking';
  } else {
    updateStatus();
  }
}

async function showHint() {
  if (!engineReady || engineBusy || viewIndex !== -1) return;
  if (chess.turn() !== playerColor) return;
  $('hint-btn').disabled = true;
  $('hint-btn').textContent = '⏳ Hint';
  // Ask engine for best move
  const best = await getBestMove(chess.fen());
  $('hint-btn').disabled = false;
  $('hint-btn').textContent = '💡 Hint';
  if (!best) return;
  const fromSq = best.slice(0, 2);
  const toSq   = best.slice(2, 4);
  // Highlight from+to squares briefly
  clearTimeout(hintTimeout);
  document.querySelectorAll('.hint-highlight').forEach(el => el.classList.remove('hint-highlight'));
  const fromEl = document.querySelector(`[data-sq="${fromSq}"]`);
  const toEl   = document.querySelector(`[data-sq="${toSq}"]`);
  if (fromEl) fromEl.classList.add('hint-highlight');
  if (toEl)   toEl.classList.add('hint-highlight');
  hintTimeout = setTimeout(() => {
    document.querySelectorAll('.hint-highlight').forEach(el => el.classList.remove('hint-highlight'));
  }, 2000);
}

function resign() {
  if (chess.game_over()) return;
  if (!confirm('Resign this game?')) return;
  playSound('notify');
  $('modal-glyph').textContent = '🏳';
  $('modal-title').textContent = 'You resigned';
  $('modal-msg').textContent = 'Better luck next time. BLUERICA wins. 😼';
  $('overlay').classList.add('show');
  $('status-badge').textContent = 'resigned';
  $('status-badge').className = 'status-badge';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadSounds();
initEngine();
renderBoard();
setupRightClickOnBoard();
renderArrows();
</script>
